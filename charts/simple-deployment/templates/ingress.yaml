{{- if and .Values.ingress.enable (not .Values.service.enable)}}
{{- fail "The service is not enabled, which is a dependency for the ingress."}}
{{- end }}

{{- if and (.Values.ingress.enable) (.Values.service.enable) }}
{{- /* Build list of all hostnames */ -}}
{{- $hosts := list .Values.ingress.host }}

{{- /* Add www redirect host if enabled */ -}}
{{- if .Values.ingress.wwwRedirect }}
{{- $hosts = append $hosts (printf "www.%s" .Values.ingress.host) }}
{{- end }}

{{- /* Add additional hosts (supports both string and object formats for backward compatibility) */ -}}
{{- range .Values.ingress.additionalHosts }}
  {{- $additionalHost := "" }}
  {{- if kindIs "string" . }}
    {{- $additionalHost = . }}
  {{- else }}
    {{- $additionalHost = .host }}
  {{- end }}
  {{- $hosts = append $hosts $additionalHost }}
  {{- /* Add www version if wwwRedirect is enabled */ -}}
  {{- if $.Values.ingress.wwwRedirect }}
  {{- $hosts = append $hosts (printf "www.%s" $additionalHost) }}
  {{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "deployment.name" $ }}
  {{- with .Values.ingress }}
  annotations:
    {{- with .annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if not $.Values.ingress.ingressClassName }}
    {{- if not (hasKey .annotations "cert-manager.io/cluster-issuer") }}
    {{- if .wwwRedirect }}
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    {{- end }}
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .sslRedirect | default "false" | quote }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.clusterIssuer | default ( include "ingress.cluster-issuer" $) | trim }}
    {{- end }}
  labels:
    {{- include "deployment.labels" $ | nindent 4 }}
    {{- range $k, $v := .labels }}
    {{- printf "%s: %s" $k ($v | quote) | nindent 4 }}
    {{- end }}
    {{- if .createDNSRecord }}
    external-dns-create: "true"
    {{- end }}
  {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName | default ( include "ingress.classname" $) | trim }}
  rules:
  {{- range $hosts }}
  - host: {{ . }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "deployment.name" $ }}
            port:
              number: {{ $.Values.deployment.container.containerPort | default "8080" }}
      {{- with $.Values.ingress.addtionalPaths }}
      {{ toYaml . | nindent 6}}
      {{- end }}
  {{- end }}
  tls:
  {{- range $hosts }}
  - hosts:
    - {{ . }}
    secretName: "le-cert-{{ . | replace "." "-" | trunc 54 | trimSuffix "-" }}"
  {{- end }}
{{- end }}
